  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Georgia,serif}
    #app-loading{position:fixed;inset:0;background:linear-gradient(160deg,#FFF176,#FFE500,#FFF59D);
      display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999}
    #app-loading h2{color:#1B4F72;font-size:24px;margin-top:14px;font-weight:bold}

    .spinner{width:52px;height:52px;border:5px solid #1B4F72;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #ios-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:99998;align-items:flex-end;justify-content:center}
    #ios-modal.show{display:flex}
    #ios-box{background:#fff;border-radius:20px 20px 0 0;padding:26px 20px;width:100%;max-width:480px;animation:slideUp .35s ease}

    #ios-box .sub{font-size:13px;color:#888;margin-bottom:18px}

    .ios-row:last-of-type{border:none;margin-bottom:10px}
    .ios-num{min-width:30px;height:30px;background:#1B4F72;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px}
    .ios-txt{font-size:14px;color:#333;line-height:1.5;padding-top:4px}
    #ios-close-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1B4F72,#2E86AB);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:4px}
    #android-done{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#059669;color:#fff;padding:10px 24px;border-radius:30px;font-size:14px;font-weight:bold;z-index:99997;box-shadow:0 4px 16px rgba(0,0,0,0.2);white-space:nowrap}

  "Cancelled":  { bg:"#FEE2E2", color:"#DC2626" },
};
function generateId() { return "LBZ" + Date.now().toString().slice(-6) + Math.floor(Math.random()*100); }

export default function App() {
  // ── STATE ──────────────────────────────────────────────────
  const [view, setView]               = useState("home");
  const [role, setRole]               = useState(null);
  const [loggedUser, setLoggedUser]   = useState(null);
  const [adminTab, setAdminTab]       = useState("bookings");
  const [loading, setLoading]         = useState(true);
  const [saving, setSaving]           = useState(false);
  const [dbError, setDbError]         = useState("");

  const [bookings, setBookings]       = useState([]);
  const [users, setUsers]             = useState([]);
  const [packages, setPackages]       = useState([]);
  const [tests, setTests]             = useState([]);
  const [weeklyOffers, setWeeklyOffers] = useState([]);

  const [form, setForm]               = useState({ name:"",address:"",age:"",contact:"",sex:"",date:"",time:"",package:"",selectedTests:[] });
  const [errors, setErrors]           = useState({});
  const [policyAccepted, setPolicyAccepted] = useState(false);
  const [showPolicy, setShowPolicy]   = useState(false);
  const [showDisclaimer, setShowDisclaimer] = useState(false);
  const [submitting, setSubmitting]   = useState(false);
  const [fastingAlert, setFastingAlert] = useState([]);
  const [confirmedBooking, setConfirmedBooking] = useState(null);

  const [loginRole, setLoginRole]     = useState("admin");
  const [loginPwd, setLoginPwd]       = useState("");
  const [loginError, setLoginError]   = useState("");
  const [mustChangePwd, setMustChangePwd] = useState(false);
  const [changePwdData, setChangePwdData] = useState({ oldPwd:"",newPwd:"",confirmPwd:"" });
  const [changePwdMsg, setChangePwdMsg]   = useState({ text:"",ok:false });

  const [showUserLogin, setShowUserLogin] = useState(false);
  const [userLoginForm, setUserLoginForm] = useState({ username:"",password:"" });
  const [userLoginError, setUserLoginError] = useState("");
  const [userSideView, setUserSideView]   = useState("mybookings");
  const [showSignup, setShowSignup]       = useState(false);
  const [signupForm, setSignupForm]       = useState({ name:"",username:"",contact:"",password:"",confirmPwd:"" });
  const [signupError, setSignupError]     = useState("");

  const [editingId, setEditingId]         = useState(null);
  const [editForm, setEditForm]           = useState({});
  const [editingPkg, setEditingPkg]       = useState(null);
  const [editingTest, setEditingTest]     = useState(null);
  const [newPkg, setNewPkg]               = useState(null);
  const [newTest, setNewTest]             = useState(null);
  const [pwdTab, setPwdTab]               = useState("list");
  const [filterStatus, setFilterStatus]   = useState("All");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [seenBookings, setSeenBookings]   = useState([]);
  const [shareMsg, setShareMsg]           = useState("");
  const [toast, setToast]                 = useState("");

  // ── LOAD ALL DATA FROM SUPABASE ─────────────────────────────
  const loadAll = useCallback(async () => {
    setLoading(true);
    setDbError("");
    try {
      const [b, u, p, t, o] = await Promise.all([
        DB.getBookings(), DB.getUsers(), DB.getPackages(), DB.getTests(), DB.getOffers()
      ]);
      setBookings(b || []);
      setUsers(u || []);
      setPackages(p || []);
      setTests(t || []);
      setWeeklyOffers(o || []);
    } catch(e) {
      setDbError("Cannot connect to database. Check internet connection.\n" + e.message);
    }
    setLoading(false);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Auto-refresh bookings every 30 seconds when in portal
  useEffect(() => {
    if (!role) return;
    const interval = setInterval(async () => {
      try {
        const b = await DB.getBookings();
        setBookings(b || []);
      } catch(e) {}
    }, 30000);
    return () => clearInterval(interval);
  }, [role]);

  // Fasting alerts
  useEffect(() => {
    const alerts = [];
    form.selectedTests.forEach(tid => {
      const t = tests.find(x=>x.id===tid);
      if (t && t.fasting) alerts.push({ name:t.name, note:t.fasting_note });
    });
    if (form.package) {
      const pkg = packages.find(p=>p.id===form.package);
      if (pkg) {
        const fastTests = ["Lipid","Blood Sugar","LFT","Fasting"];
        (pkg.tests||"").split(",").forEach(pt => {
          if (fastTests.some(ft=>pt.toLowerCase().includes(ft.toLowerCase()))) {
            alerts.push({ name:pt.trim(), note:"Fasting recommended" });
          }
        });
      }
    }
    setFastingAlert(alerts);
  }, [form.selectedTests, form.package, tests, packages]);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(""),3000); }

  // ── PRICE CALCULATION ───────────────────────────────────────
  function calcTotal() {
    let total = 0;
    if (form.package) {
      const pkg = packages.find(p=>p.id===form.package);
      if (pkg) total += Number(pkg.price);
    }
    form.selectedTests.forEach(tid => {
      const t = tests.find(x=>x.id===tid);
      if (t) total += Number(t.price);
    });
    return total;
  }
  function calcOriginal() {
    let total = 0;
    if (form.package) {
      const pkg = packages.find(p=>p.id===form.package);
      if (pkg) total += Number(pkg.original_price);
    }
    form.selectedTests.forEach(tid => {
      const t = tests.find(x=>x.id===tid);
      if (t) total += Number(t.price);
    });
    return total;
  }

  // ── VALIDATION ──────────────────────────────────────────────
  function validate() {
    const e = {};
    if (!form.name.trim()) e.name="Name is required";
    if (!form.address.trim()) e.address="Address is required";
    if (!form.age||isNaN(form.age)||+form.age<1||+form.age>120) e.age="Valid age required";
    if (!form.contact.trim()||!/^\d{10}$/.test(form.contact.trim())) e.contact="Valid 10-digit number required";
    if (!form.sex) e.sex="Please select sex";
    if (!form.date) e.date="Date is required";
    if (!form.time) e.time="Time is required";
    if (!form.package && form.selectedTests.length===0) e.tests="Select a package or at least one test";
    return e;
  }

  // ── BOOKING SUBMIT ──────────────────────────────────────────
  async function handleSubmit() {
    const e = validate(); setErrors(e);
    if (Object.keys(e).length) return;
    if (!policyAccepted) { alert("Please accept the Terms & Policy to proceed."); return; }
    setSubmitting(true);
    try {
      const pkg = form.package ? packages.find(p=>p.id===form.package) : null;
      const selTests = form.selectedTests.map(tid=>tests.find(x=>x.id===tid)).filter(Boolean);
      const booking = {
        id: generateId(),
        name: form.name, address: form.address, age: form.age,
        contact: form.contact, sex: form.sex, date: form.date, time: form.time,
        package_name: pkg ? pkg.name : "",
        test_names: selTests.map(t=>t.name).join(", "),
        total_amount: calcTotal(),
        status: "Pending", assigned_phlebo: "", lab_notes: "",
        submitted_at: new Date().toLocaleString()
      };
      await DB.addBooking(booking);
      setConfirmedBooking(booking);
      setBookings(prev=>[booking,...prev]);
      setView("confirmed");
      setForm({ name:"",address:"",age:"",contact:"",sex:"",date:"",time:"",package:"",selectedTests:[] });
      setPolicyAccepted(false);
    } catch(err) {
      alert("Failed to save booking. Please try again.\n"+err.message);
    }
    setSubmitting(false);
  }

  // ── AUTH ────────────────────────────────────────────────────
  async function handleLogin() {
    const matched = users.find(u=>u.username===loginRole && u.password===loginPwd && u.active!==false);
    if (matched) {
      setRole(matched.role); setLoggedUser(matched);
      if (matched.must_change) { setMustChangePwd(true); setView("portal"); }
      else if (matched.role==="user") { setView("portal"); setUserSideView("mybookings"); }
      else { setView("portal"); }
      setLoginError(""); setLoginPwd("");
      if (matched.role==="admin") setSeenBookings(bookings.map(b=>b.id));
    } else {
      const any = users.find(u=>u.username===loginRole);
      setLoginError(any ? "Incorrect password" : "User not found");
    }
  }

  async function handleUserLogin() {
    const matched = users.find(u=>u.username===userLoginForm.username && u.password===userLoginForm.password && u.active!==false && u.role==="user");
    if (matched) {
      setRole("user"); setLoggedUser(matched); setShowUserLogin(false);
      setUserSideView("mybookings"); setView("portal"); setUserLoginError("");
    } else { setUserLoginError("Invalid username or password. New? Click Sign Up."); }
  }

  async function handleSignup() {
    const { name, username, contact, password, confirmPwd } = signupForm;
    if (!name.trim()) { setSignupError("Full name is required"); return; }
    if (!username.trim()||username.length<3) { setSignupError("Username must be at least 3 characters"); return; }
    if (users.find(u=>u.username===username.trim())) { setSignupError("Username already taken"); return; }
    if (!contact.trim()||!/^\d{10}$/.test(contact.trim())) { setSignupError("Valid 10-digit number required"); return; }
    if (password.length<4) { setSignupError("Password must be at least 4 characters"); return; }
    if (password!==confirmPwd) { setSignupError("Passwords do not match"); return; }
    try {
      const newUser = { id:"u_"+Date.now(), name:name.trim(), username:username.trim(), contact:contact.trim(), password, role:"user", active:true, must_change:false };
      await DB.addUser(newUser);
      setUsers(prev=>[...prev,newUser]);
      setRole("user"); setLoggedUser(newUser); setShowUserLogin(false); setShowSignup(false);
      setUserSideView("mybookings"); setView("portal"); setSignupError("");
      setSignupForm({ name:"",username:"",contact:"",password:"",confirmPwd:"" });
    } catch(err) { setSignupError("Signup failed: "+err.message); }
  }

  function logout() {
    setRole(null); setLoggedUser(null); setView("home"); setLoginPwd(""); setLoginError("");
    setChangePwdData({oldPwd:"",newPwd:"",confirmPwd:""}); setChangePwdMsg({text:"",ok:false});
    setMustChangePwd(false); setUserSideView("mybookings"); setShowUserLogin(false);
    setUserLoginForm({username:"",password:""}); setUserLoginError("");
  }

  // ── BOOKING OPERATIONS ──────────────────────────────────────
  async function updateBookingField(id, data) {
    try {
      await DB.updateBooking(id, data);
      setBookings(prev=>prev.map(b=>b.id===id?{...b,...data}:b));
    } catch(e) { showToast("❌ Update failed"); }
  }

  function startEdit(b) { setEditingId(b.id); setEditForm({...b}); }
  async function saveEdit() {
    try {
      await DB.updateBooking(editingId, editForm);
      setBookings(prev=>prev.map(b=>b.id===editingId?{...editForm}:b));
      setEditingId(null); showToast("✅ Booking updated");
    } catch(e) { showToast("❌ Save failed"); }
  }

  // ── DELETE ──────────────────────────────────────────────────
  function requestDelete(type,id,label) { setConfirmDelete({type,id,label}); }
  async function doDelete() {
    if (!confirmDelete) return;
    const {type,id} = confirmDelete;
    try {
      if (type==="booking") { await DB.deleteBooking(id); setBookings(prev=>prev.filter(b=>b.id!==id)); }
      if (type==="pkg")     { await DB.deletePackage(id); setPackages(prev=>prev.filter(p=>p.id!==id)); }
      if (type==="test")    { await DB.deleteTest(id);    setTests(prev=>prev.filter(t=>t.id!==id)); }
      if (type==="user")    { await DB.deleteUser(id);    setUsers(prev=>prev.filter(u=>u.id!==id)); }
      if (type==="offer")   { await DB.deleteOffer(id);   setWeeklyOffers(prev=>prev.filter(o=>o.id!==id)); }
      showToast("🗑 Deleted successfully");
    } catch(e) { showToast("❌ Delete failed: "+e.message); }
    setConfirmDelete(null);
  }

  // ── SHARE ───────────────────────────────────────────────────
  function shareBooking(b) {
    const msg = `*Logbuz Booking*\nID: ${b.id}\nPatient: ${b.name} | ${b.age}yrs/${b.sex}\n📞 ${b.contact}\n📍 ${b.address}\n🗓 ${b.date} @ ${b.time}\n📦 ${b.package_name||""}\n🧪 ${b.test_names||""}\n💰 ₹${b.total_amount||0}\nStatus: ${b.status||"Pending"}\n\nLogbuz Support: 9419043000`;
    window.open(`https://wa.me/91${b.contact}?text=${encodeURIComponent(msg)}`,"_blank");
    setShareMsg("Shared!"); setTimeout(()=>setShareMsg(""),2000);
  }


  // ── STYLES ──────────────────────────────────────────────────
  const S = {
    root: { fontFamily:"'Georgia',serif", minHeight:"100vh", background:"linear-gradient(160deg,#FFF176 0%,#FFE500 40%,#FFF59D 100%)", color:"#1a1a1a" },
    header: (c="#1B4F72") => ({ background:`linear-gradient(135deg,${c},${c}cc)`, padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 2px 12px rgba(0,0,0,0.15)" }),
    logo: { color:"#fff", fontSize:"24px", fontWeight:"bold", letterSpacing:"1px" },
    logoSub: { color:"rgba(255,255,255,0.7)", fontSize:"10px", letterSpacing:"3px", display:"block" },
    support: { background:"rgba(255,255,255,0.15)", borderRadius:"8px", padding:"5px 10px", color:"#fff", fontSize:"12px", textAlign:"right" },
    supportNum: { fontSize:"14px", fontWeight:"bold", color:"#7FE8D0" },
    body: { maxWidth:"720px", margin:"0 auto", padding:"20px 14px" },
    sectionTitle: { fontSize:"13px", fontWeight:"bold", color:"#2E86AB", letterSpacing:"2px", textTransform:"uppercase", marginBottom:"12px" },
    card: { background:"#fff", borderRadius:"16px", padding:"22px", boxShadow:"0 2px 16px rgba(0,0,0,0.07)", marginBottom:"18px" },
    adminCard: { background:"#fff", borderRadius:"12px", padding:"14px", marginBottom:"10px", boxShadow:"0 1px 8px rgba(0,0,0,0.06)", border:"1px solid #eee" },
    formRow: { marginBottom:"14px" },
    label: { display:"block", fontSize:"11px", fontWeight:"bold", color:"#555", letterSpacing:"1px", marginBottom:"4px", textTransform:"uppercase" },
    input: (err) => ({ width:"100%", padding:"10px 12px", borderRadius:"8px", fontSize:"14px", boxSizing:"border-box", border:err?"2px solid #E74C3C":"2px solid #BEE3F8", outline:"none", background:"#EBF8FF", color:"#1a1a1a" }),
    select: (err) => ({ width:"100%", padding:"10px 12px", borderRadius:"8px", fontSize:"14px", boxSizing:"border-box", border:err?"2px solid #E74C3C":"2px solid #BEE3F8", outline:"none", background:"#EBF8FF", color:"#1a1a1a" }),
    errMsg: { color:"#E74C3C", fontSize:"11px", marginTop:"3px" },
    grid2: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px" },
    submitBtn: { width:"100%", padding:"13px", background:"linear-gradient(135deg,#1B4F72,#2E86AB)", color:"#fff", border:"none", borderRadius:"10px", fontSize:"15px", fontWeight:"bold", cursor:"pointer", marginTop:"6px", boxShadow:"0 4px 14px rgba(46,134,171,0.4)" },
    tag: (color) => ({ background:color+"22", color, borderRadius:"5px", padding:"2px 8px", fontSize:"11px", fontWeight:"bold" }),
    btn: (color) => ({ background:color, color:"#fff", border:"none", borderRadius:"6px", padding:"6px 11px", cursor:"pointer", fontSize:"12px", fontWeight:"bold", margin:"0 3px" }),
    outlineBtn: (color) => ({ background:"transparent", border:`2px solid ${color}`, color, borderRadius:"8px", padding:"8px 20px", cursor:"pointer", fontSize:"13px", fontWeight:"bold" }),
    statusBadge: (s) => { const c=STATUS_COLORS[s]||STATUS_COLORS["Pending"]; return { background:c.bg, color:c.color, borderRadius:"20px", padding:"3px 10px", fontSize:"11px", fontWeight:"bold" }; },
  };

  const LogoImg = ({h=46}) => <img src={LOGO_SRC} alt="Logbuz" style={{height:`${h}px`,width:`${h*0.83}px`,objectFit:"contain",background:"#fff",borderRadius:"6px",padding:"2px"}}/>;

  const Header = ({sub="HOME COLLECTION",showSupport=true,roleColor="#1B4F72"}) => (
    <div style={S.header(roleColor)}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <LogoImg h={46}/>
        <div><span style={S.logo}>Logbuz</span><span style={S.logoSub}>{sub}</span></div>
      </div>
      <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
        {showSupport && <div style={S.support}><div style={{fontSize:"10px",color:"rgba(255,255,255,0.6)"}}>Support</div><div style={S.supportNum}>📞 9419043000</div></div>}
        {role && <button style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontSize:"12px"}} onClick={logout}>Logout</button>}
        {!role && (
          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
            <button style={{background:"linear-gradient(135deg,#FFE500,#FFC200)",border:"none",color:"#1B4F72",borderRadius:"20px",padding:"6px 12px",cursor:"pointer",fontSize:"11px",fontWeight:"bold",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}} onClick={()=>window.__logbuzInstall&&window.__logbuzInstall()}>
              📲 Install
            </button>
            <button style={{background:"rgba(255,212,0,0.25)",border:"1px solid rgba(255,212,0,0.5)",color:"#FFD700",borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontSize:"11px",fontWeight:"bold"}} onClick={()=>setShowUserLogin(true)}>
              👤 My Account
            </button>
            <button style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontSize:"11px",position:"relative"}} onClick={()=>setView("login")}>
              Staff Login
              {bookings.filter(b=>!seenBookings.includes(b.id)).length>0 && (
                <span style={{position:"absolute",top:"-6px",right:"-6px",background:"#E74C3C",color:"#fff",borderRadius:"50%",width:"18px",height:"18px",fontSize:"11px",fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid #fff"}}>
                  {bookings.filter(b=>!seenBookings.includes(b.id)).length}
                </span>
              )}
            </button>
          </div>
        )}
      </div>
    </div>
  );


  // ── LOADING SCREEN ──────────────────────────────────────────
  if (loading) return (
    <div style={{...S.root,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <LogoImg h={80}/>
      <div style={{marginTop:"20px",fontSize:"22px",fontWeight:"bold",color:"#1B4F72"}}>Logbuz</div>
      <div style={{marginTop:"10px",fontSize:"14px",color:"#1B4F72",opacity:0.7}}>Connecting to database...</div>
      {dbError && (
        <div style={{margin:"20px",background:"#FEE2E2",borderRadius:"12px",padding:"16px",maxWidth:"400px",textAlign:"center"}}>
          <div style={{color:"#DC2626",fontWeight:"bold",marginBottom:"8px"}}>⚠️ Connection Error</div>
          <div style={{fontSize:"12px",color:"#555",marginBottom:"12px"}}>{dbError}</div>
          <button style={S.submitBtn} onClick={loadAll}>Retry</button>
        </div>
      )}
    </div>
  );

  // ── CONFIRMED ───────────────────────────────────────────────
  if (view==="confirmed" && confirmedBooking) {
    const b = confirmedBooking;
    return (
      <div style={S.root}>
        <Header/>
        <div style={S.body}>
          <div style={{...S.card,textAlign:"center",padding:"32px 24px"}}>
            <div style={{width:"68px",height:"68px",background:"linear-gradient(135deg,#059669,#34D399)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"30px",margin:"0 auto 14px"}}>✓</div>
            <h2 style={{color:"#059669",margin:"0 0 6px"}}>Booking Confirmed!</h2>
            <p style={{color:"#666",fontSize:"14px",marginBottom:"14px"}}>Details received. Your booking is confirmed.</p>
            <div style={{background:"#EFF6FF",border:"2px dashed #2E86AB",borderRadius:"10px",padding:"14px",margin:"14px 0",fontSize:"20px",fontWeight:"bold",color:"#1B4F72",letterSpacing:"2px"}}>
              Booking ID: {b.id}
            </div>
            <div style={{textAlign:"left",background:"#F8F6F1",borderRadius:"10px",padding:"14px",margin:"14px 0"}}>
              {[["Patient",b.name],["Age/Sex",`${b.age} yrs / ${b.sex}`],["Contact",b.contact],["Date",b.date],["Time",b.time],...(b.package_name?[["Package",b.package_name]]:[]),...(b.test_names?[["Tests",b.test_names]]:[]),["Total",`₹${b.total_amount||0}`]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:"13px",borderBottom:"1px solid #eee"}}>
                  <span style={{color:"#888"}}>{k}</span><span style={{fontWeight:"bold"}}>{v}</span>
                </div>
              ))}
            </div>
            {fastingAlert.length>0 && (
              <div style={{background:"#FFF8E7",border:"2px solid #F59E0B",borderRadius:"10px",padding:"12px",marginBottom:"14px",textAlign:"left"}}>
                <div style={{fontWeight:"bold",color:"#D97706",marginBottom:"6px"}}>⚠️ Fasting Required</div>
                {fastingAlert.map((a,i)=><div key={i} style={{fontSize:"12px",color:"#92400E",marginBottom:"3px"}}>• <strong>{a.name}</strong>: {a.note}</div>)}
              </div>
            )}
            <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap",marginTop:"16px"}}>
              <a href={`https://wa.me/919419043000?text=${encodeURIComponent(`Hi, my booking ID is ${b.id}. Name: ${b.name}`)}`} target="_blank" rel="noreferrer"
                style={{...S.btn("#25D366"),borderRadius:"8px",padding:"10px 18px",textDecoration:"none",fontSize:"14px"}}>💬 WhatsApp Support</a>
              <button style={S.outlineBtn("#2E86AB")} onClick={()=>setView("home")}>Book Another</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── FORCE PASSWORD CHANGE ───────────────────────────────────
  if (view==="portal" && mustChangePwd && loggedUser) {
    return (
      <div style={S.root}>
        <Header sub="SET YOUR PASSWORD" roleColor={ROLE_COLORS[role]||"#1B4F72"} showSupport={false}/>
        <div style={S.body}>
          <div style={{...S.card,maxWidth:"400px",margin:"30px auto",textAlign:"center"}}>
            <div style={{fontSize:"44px",marginBottom:"12px"}}>🔐</div>
            <h3 style={{color:"#1B4F72",margin:"0 0 6px"}}>Set Your Password</h3>
            <p style={{fontSize:"13px",color:"#888",marginBottom:"20px"}}>Welcome {loggedUser.name}! Please set a personal password.</p>
            {[["newPwd","New Password"],["confirmPwd","Confirm Password"]].map(([f,l])=>(
              <div key={f} style={{...S.formRow,textAlign:"left"}}>
                <label style={S.label}>{l}</label>
                <input type="password" style={S.input(false)} value={changePwdData[f]} placeholder={l} onChange={e=>setChangePwdData(p=>({...p,[f]:e.target.value}))}/>
              </div>
            ))}

                    background:filterStatus===s?(STATUS_COLORS[s]?.color||"#1B4F72"):"#eee",color:filterStatus===s?"#fff":"#555"}}>
                    {s}{s!=="All"&&counts[s]?` (${counts[s]})`:""}</button>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                <div style={S.sectionTitle}>{filtered.length} Booking{filtered.length!==1?"s":""} {filterStatus!=="All"?`— ${filterStatus}`:""}</div>
                <button style={{...S.btn("#2E86AB"),fontSize:"11px"}} onClick={loadAll}>🔄 Refresh</button>
              </div>
              {filtered.length===0&&<div style={{...S.card,textAlign:"center",color:"#aaa"}}>No bookings found.</div>}
              {filtered.map(b=>(
                <div key={b.id} style={S.adminCard}>
                  {editingId===b.id&&role==="admin"?(
                    <div>
                      <div style={{...S.sectionTitle,marginBottom:"10px"}}>✏️ Editing {b.id}</div>
                      <div style={S.grid2}>
                        {["name","contact","age","sex","date","time"].map(f=>(
                          <div key={f} style={S.formRow}><label style={S.label}>{f}</label><input style={S.input(false)} value={editForm[f]||""} onChange={e=>setEditForm(p=>({...p,[f]:e.target.value}))}/></div>
                        ))}
                      </div>
                      <div style={S.formRow}><label style={S.label}>Address</label><input style={S.input(false)} value={editForm.address||""} onChange={e=>setEditForm(p=>({...p,address:e.target.value}))}/></div>
                      <div style={S.formRow}><label style={S.label}>Tests</label><input style={S.input(false)} value={editForm.test_names||""} onChange={e=>setEditForm(p=>({...p,test_names:e.target.value}))}/></div>
                      <div style={S.formRow}>
                        <label style={S.label}>Assign Phlebotomist</label>
                        <select style={S.select(false)} value={editForm.assigned_phlebo||""} onChange={e=>setEditForm(p=>({...p,assigned_phlebo:e.target.value}))}>
                          <option value="">— Select Phlebo —</option>
                          {users.filter(u=>u.role==="phlebo"&&u.active!==false).map(u=>(
                            <option key={u.id} value={u.name}>{u.name}{u.contact?` (${u.contact})`:""}</option>
                          ))}
                        </select>
                      </div>
                      <div style={S.formRow}><label style={S.label}>Total Amount (₹)</label><input type="number" style={S.input(false)} value={editForm.total_amount||0} onChange={e=>setEditForm(p=>({...p,total_amount:+e.target.value}))}/></div>
                      <button style={S.btn("#059669")} onClick={saveEdit}>💾 Save</button>
                      <button style={S.btn("#888")} onClick={()=>setEditingId(null)}>Cancel</button>
                    </div>
                  ):(
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"6px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                          <span style={{fontWeight:"bold",fontSize:"15px",color:"#1B4F72"}}>{b.name}</span>
                          <span style={S.tag("#2E86AB")}>{b.id}</span>
                          <span style={S.statusBadge(b.status||"Pending")}>{b.status||"Pending"}</span>
                          {b.package_name&&<span style={S.tag("#7C3AED")}>{b.package_name}</span>}
                          {b.total_amount>0&&<span style={S.tag("#059669")}>₹{b.total_amount}</span>}
                        </div>
                        <span style={{fontSize:"11px",color:"#bbb"}}>{b.submitted_at}</span>
                      </div>
                      <div style={{fontSize:"13px",color:"#555",marginTop:"8px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 14px"}}>
                        <span>📞 {b.contact}</span>
                        <span>🗓 {b.date} @ {b.time}</span>
                        <span>👤 {b.age} yrs / {b.sex}</span>
                        <span>📍 {b.address?.substring(0,28)}{b.address?.length>28?"…":""}</span>
                        {b.test_names&&<span style={{gridColumn:"1/-1"}}>🧪 {b.test_names}</span>}
                        {b.assigned_phlebo&&<span style={{gridColumn:"1/-1",color:"#059669"}}>👨‍⚕️ Phlebo: <strong>{b.assigned_phlebo}</strong></span>}
                      </div>
                      {/* Quick Phlebo Assign */}
                      {role==="admin"&&(
                        <div style={{marginTop:"10px",background:"#F0F9FF",border:"1.5px solid #BEE3F8",borderRadius:"10px",padding:"10px 12px"}}>
                          <div style={{fontSize:"11px",fontWeight:"bold",color:"#2E86AB",letterSpacing:"1px",marginBottom:"6px"}}>👨‍⚕️ ASSIGN PHLEBOTOMIST</div>
                          <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
                            <select style={{flex:1,padding:"8px 10px",borderRadius:"8px",fontSize:"13px",border:"2px solid #2E86AB",background:"#fff",color:"#1B4F72",fontWeight:"bold",cursor:"pointer",minWidth:"160px"}}
                              value={b.assigned_phlebo||""}
                              onChange={async e=>{
                                const val=e.target.value;
                                const newStatus=val&&(b.status==="Pending"||!b.status)?"Assigned":(!val?"Pending":b.status);
                                await updateBookingField(b.id,{assigned_phlebo:val,status:newStatus});
                              }}>
                              <option value="">— Select Phlebotomist —</option>
                              {users.filter(u=>u.role==="phlebo"&&u.active!==false).map(u=>(
                                <option key={u.id} value={u.name}>{u.name}{u.contact?` · ${u.contact}`:""}</option>
                              ))}
                            </select>
                            {b.assigned_phlebo&&(
                              <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                                <span style={{...S.tag("#059669"),fontSize:"12px"}}>✓ {b.assigned_phlebo}</span>
                                <button style={{...S.btn("#E74C3C"),padding:"4px 8px",fontSize:"11px"}} onClick={()=>updateBookingField(b.id,{assigned_phlebo:"",status:"Pending"})}>✕</button>
                              </div>
                            )}
                          </div>
                          {users.filter(u=>u.role==="phlebo"&&u.active!==false).length===0&&<div style={{fontSize:"11px",color:"#E74C3C",marginTop:"4px"}}>No active phlebotomists. Add one in 👥 Users tab.</div>}
                        </div>
                      )}
                      {(role==="lab"||role==="admin")&&(
                        <div style={{marginTop:"8px"}}>
                          <input style={{...S.input(false),fontSize:"12px",padding:"6px 10px"}} placeholder="Lab notes / remarks..." value={b.lab_notes||""} onChange={async e=>{await updateBookingField(b.id,{lab_notes:e.target.value});}}/>
                        </div>
                      )}
                      <div style={{marginTop:"8px",display:"flex",flexWrap:"wrap",gap:"4px"}}>
                        {role==="admin"&&(
                          <>
                            <select style={{padding:"5px 8px",borderRadius:"6px",fontSize:"12px",border:"1px solid #ccc",background:"#f9f9f9",cursor:"pointer"}} value={b.status||"Pending"} onChange={async e=>await updateBookingField(b.id,{status:e.target.value})}>
                              {Object.keys(STATUS_COLORS).map(s=><option key={s}>{s}</option>)}
                            </select>
                            <button style={S.btn("#2E86AB")} onClick={()=>startEdit(b)}>✏️ Edit</button>
                            <button style={S.btn("#E74C3C")} onClick={()=>requestDelete("booking",b.id,`booking ${b.id}`)}>🗑</button>
                          </>
                        )}
                        {role==="lab"&&["Processing","Completed"].map(s=><button key={s} style={S.btn(STATUS_COLORS[s].color)} onClick={()=>updateBookingField(b.id,{status:s})}>→ {s}</button>)}
                        {role==="phlebo"&&(
                          <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                            {["Collected"].map(s=><button key={s} style={S.btn(STATUS_COLORS[s].color)} onClick={()=>updateBookingField(b.id,{status:s})}>✓ Mark Collected</button>)}
                            <button style={S.btn("#E74C3C")} onClick={()=>requestDelete("booking",b.id,b.name)}>🗑 Delete</button>
                          </div>
                        )}
                        <button style={S.btn("#25D366")} onClick={()=>shareBooking(b)}>💬 Share</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Delete Confirm Modal */}
        {confirmDelete&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
            <div style={{background:"#fff",borderRadius:"16px",maxWidth:"320px",width:"100%",padding:"28px",textAlign:"center"}}>
              <div style={{fontSize:"44px",marginBottom:"10px"}}>🗑️</div>
              <h3 style={{color:"#E74C3C",margin:"0 0 8px"}}>Delete?</h3>
              <p style={{fontSize:"13px",color:"#555",margin:"0 0 20px"}}>Delete <strong>{confirmDelete.label}</strong>? This cannot be undone.</p>
              <div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
                <button onClick={()=>setConfirmDelete(null)} style={{padding:"10px 22px",borderRadius:"8px",border:"2px solid #ccc",background:"#fff",color:"#555",fontWeight:"bold",cursor:"pointer"}}>Cancel</button>
                <button onClick={doDelete} style={{padding:"10px 22px",borderRadius:"8px",border:"none",background:"#E74C3C",color:"#fff",fontWeight:"bold",cursor:"pointer"}}>Yes, Delete</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }


  // ── HOME PAGE ────────────────────────────────────────────────
  const today = new Date().toISOString().split("T")[0];
  const total = calcTotal();
  const origTotal = calcOriginal();
  const savings = origTotal - total;

  return (
    <div style={S.root}>
      <Header/>

      {/* Scrolling Offer Banner */}
      {weeklyOffers.filter(o=>o.active).length>0&&(
        <div style={{background:"linear-gradient(90deg,#1B4F72,#2E86AB,#1B4F72)",overflow:"hidden",position:"relative"}}>
          <div style={{display:"flex",animation:"scroll 18s linear infinite",whiteSpace:"nowrap",padding:"10px 0"}}>
            {[...weeklyOffers.filter(o=>o.active),...weeklyOffers.filter(o=>o.active)].map((o,i)=>(
              <span key={i} style={{color:"#fff",fontSize:"13px",fontWeight:"bold",padding:"0 40px",flexShrink:0}}>{o.text}</span>
            ))}
          </div>
          <style>{`@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}`}</style>
        </div>
      )}

      {/* Partner Labs Strip */}
      <div style={{background:"#fff",borderBottom:"2px solid #E2E8F0",padding:"8px 20px",display:"flex",alignItems:"center",gap:"12px",flexWrap:"wrap",justifyContent:"center"}}>
        <span style={{fontSize:"11px",fontWeight:"bold",color:"#888",letterSpacing:"2px",textTransform:"uppercase",flexShrink:0}}>Partner Labs</span>
        {[{name:"Atulaya Healthcare",color:"#E74C3C"},{name:"Dr. Lal PathLabs",color:"#C0392B"},{name:"Agilus Diagnostics",color:"#2980B9"}].map(lab=>(
          <div key={lab.name} style={{display:"flex",alignItems:"center",gap:"5px",background:lab.color+"15",border:`1px solid ${lab.color}44`,borderRadius:"20px",padding:"4px 10px"}}>
            <span style={{fontSize:"11px",fontWeight:"bold",color:lab.color}}>🏥 {lab.name}</span>
          </div>
        ))}
      </div>

      <div style={S.body}>
        {/* Packages */}
        <div style={S.sectionTitle}>Health Packages</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"24px"}}>
          {packages.filter(p=>p.active!==false).map(p=>{
            const sel=form.package===p.id;
            const testList=(p.tests||"").split(",").map(t=>t.trim()).filter(Boolean);
            return (
              <div key={p.id} style={{background:sel?p.color:p.bg,border:`2px solid ${p.color}`,borderRadius:"12px",padding:"13px",cursor:"pointer",transition:"all 0.2s",transform:sel?"scale(1.03)":"scale(1)",boxShadow:sel?`0 4px 16px ${p.color}55`:"none",position:"relative"}}
                onClick={()=>setForm(f=>({...f,package:sel?"":p.id}))}>
                {p.discount>0&&<div style={{position:"absolute",top:"-8px",right:"-8px",background:"#E74C3C",color:"#fff",borderRadius:"20px",padding:"2px 8px",fontSize:"11px",fontWeight:"bold"}}>🏷 {p.discount}% OFF</div>}
                {p.occasion&&<div style={{fontSize:"10px",color:sel?"rgba(255,255,255,0.8)":p.color,fontWeight:"bold",marginBottom:"2px"}}>{p.occasion}</div>}
                <div style={{fontSize:"18px"}}>{p.icon}</div>
                <div style={{display:"flex",alignItems:"baseline",gap:"6px",marginTop:"2px"}}>
                  <span style={{fontSize:"20px",fontWeight:"bold",color:sel?"#fff":p.color}}>₹{p.price}</span>
                  {p.discount>0&&<span style={{fontSize:"12px",textDecoration:"line-through",color:sel?"rgba(255,255,255,0.6)":"#aaa"}}>₹{p.original_price}</span>}
                </div>
                <div style={{fontSize:"12px",color:sel?"rgba(255,255,255,0.9)":"#555",marginTop:"2px"}}>{p.name}</div>
                <div style={{fontSize:"10px",color:sel?"rgba(255,255,255,0.75)":"#888",marginTop:"5px",lineHeight:"1.5"}}>{testList.join(" • ")}</div>
              </div>
            );
          })}
        </div>

        {/* Individual Tests */}
        <div style={S.card}>
          <div style={S.sectionTitle}>Individual Tests (Optional)</div>
          <p style={{fontSize:"12px",color:"#888",marginTop:"-8px",marginBottom:"12px"}}>Select individual tests in addition to or instead of a package</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}}>
            {tests.map(t=>{
              const sel=form.selectedTests.includes(t.id);
              return (
                <div key={t.id} onClick={()=>setForm(f=>({...f,selectedTests:sel?f.selectedTests.filter(x=>x!==t.id):[...f.selectedTests,t.id]}))}
                  style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",borderRadius:"8px",cursor:"pointer",border:`1.5px solid ${sel?"#2E86AB":"#e0e0e0"}`,background:sel?"#EBF8FF":"#fafafa",transition:"all 0.15s"}}>
                  <div style={{width:"16px",height:"16px",borderRadius:"4px",border:`2px solid ${sel?"#2E86AB":"#ccc"}`,background:sel?"#2E86AB":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {sel&&<span style={{color:"#fff",fontSize:"11px",fontWeight:"bold"}}>✓</span>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"12px",fontWeight:"bold",color:"#1a1a1a",lineHeight:"1.3"}}>{t.name}</div>
                    <div style={{fontSize:"11px",color:"#2E86AB",fontWeight:"bold"}}>₹{t.price}{t.fasting&&<span style={{color:"#D97706",marginLeft:"4px"}}>⏰</span>}</div>
                  </div>
                </div>
              );
            })}
          </div>
          {errors.tests&&<div style={{...S.errMsg,marginTop:"8px"}}>{errors.tests}</div>}
        </div>

        {/* Fasting Alert */}
        {fastingAlert.length>0&&(
          <div style={{background:"#FFF8E7",border:"2px solid #F59E0B",borderRadius:"12px",padding:"14px",marginBottom:"16px"}}>
            <div style={{fontWeight:"bold",color:"#D97706",marginBottom:"8px",fontSize:"14px"}}>⚠️ Fasting Required for Selected Tests</div>
            {fastingAlert.map((a,i)=>(
              <div key={i} style={{fontSize:"12px",color:"#92400E",marginBottom:"4px",display:"flex",alignItems:"flex-start",gap:"6px"}}>
                <span>🕐</span><div><strong>{a.name}</strong>: {a.note}</div>
              </div>
            ))}
          </div>
        )}

        {/* Price Summary */}
        {(form.package||form.selectedTests.length>0)&&(
          <div style={{background:"#F0FDF4",border:"2px solid #86EFAC",borderRadius:"12px",padding:"14px",marginBottom:"16px"}}>
            <div style={{fontWeight:"bold",color:"#166534",marginBottom:"8px",fontSize:"14px"}}>💰 Price Summary</div>
            {form.package&&(()=>{const pkg=packages.find(p=>p.id===form.package);return pkg?<div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",color:"#555",marginBottom:"4px"}}><span>📦 {pkg.name}</span><span style={{fontWeight:"bold"}}>₹{pkg.price}{pkg.discount>0&&<span style={{color:"#E74C3C",fontSize:"11px",marginLeft:"4px"}}>({pkg.discount}% off)</span>}</span></div>:null;})()}
            {form.selectedTests.map(tid=>{const t=tests.find(x=>x.id===tid);return t?<div key={tid} style={{display:"flex",justifyContent:"space-between",fontSize:"13px",color:"#555",marginBottom:"4px"}}><span>🧪 {t.name}</span><span style={{fontWeight:"bold"}}>₹{t.price}</span></div>:null;})}
            <div style={{borderTop:"2px solid #86EFAC",marginTop:"8px",paddingTop:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:"bold",color:"#166534",fontSize:"15px"}}>Total</span>
              <div style={{textAlign:"right"}}>
                {savings>0&&<div style={{fontSize:"11px",color:"#059669"}}>You save ₹{savings}!</div>}
                <span style={{fontWeight:"bold",color:"#1B4F72",fontSize:"18px"}}>₹{total}</span>
              </div>
            </div>
          </div>
        )}

        {/* Booking Form */}
        <div style={S.card}>
          <div style={S.sectionTitle}>Patient Details</div>
          <div style={S.grid2}>
            <div style={S.formRow}><label style={S.label}>Full Name *</label><input style={S.input(errors.name)} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Patient name"/>{errors.name&&<div style={S.errMsg}>{errors.name}</div>}</div>
            <div style={S.formRow}><label style={S.label}>Age *</label><input type="number" style={S.input(errors.age)} value={form.age} onChange={e=>setForm(f=>({...f,age:e.target.value}))} placeholder="Age in years"/>{errors.age&&<div style={S.errMsg}>{errors.age}</div>}</div>
          </div>
          <div style={S.grid2}>
            <div style={S.formRow}><label style={S.label}>WhatsApp Number *</label><input type="tel" style={S.input(errors.contact)} value={form.contact} onChange={e=>setForm(f=>({...f,contact:e.target.value}))} placeholder="10-digit number"/>{errors.contact&&<div style={S.errMsg}>{errors.contact}</div>}</div>
            <div style={S.formRow}><label style={S.label}>Sex *</label>
              <select style={S.select(errors.sex)} value={form.sex} onChange={e=>setForm(f=>({...f,sex:e.target.value}))}>
                <option value="">Select</option><option>Male</option><option>Female</option><option>Other</option>
              </select>{errors.sex&&<div style={S.errMsg}>{errors.sex}</div>}
            </div>
          </div>
          <div style={S.formRow}><label style={S.label}>Address *</label><input style={S.input(errors.address)} value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} placeholder="Full collection address"/>{errors.address&&<div style={S.errMsg}>{errors.address}</div>}</div>
          <div style={S.grid2}>
            <div style={S.formRow}><label style={S.label}>Preferred Date *</label><input type="date" style={S.input(errors.date)} value={form.date} min={today} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>{errors.date&&<div style={S.errMsg}>{errors.date}</div>}</div>
            <div style={S.formRow}><label style={S.label}>Preferred Time *</label>
              <select style={S.select(errors.time)} value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}>
                <option value="">Select Slot</option>
                {["6:00 AM","7:00 AM","8:00 AM","9:00 AM","10:00 AM","11:00 AM","12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM"].map(t=><option key={t}>{t}</option>)}
              </select>{errors.time&&<div style={S.errMsg}>{errors.time}</div>}
            </div>
          </div>

          {/* Collapsible Disclaimer */}
          <div style={{border:"1.5px solid #F59E0B",borderRadius:"10px",marginBottom:"12px",overflow:"hidden"}}>
            <div onClick={()=>setShowDisclaimer(d=>!d)} style={{background:"#FFF8E7",padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"16px"}}>⚠️</span><span style={{fontWeight:"bold",fontSize:"13px",color:"#B45309"}}>Disclaimer & Home Collection Policy</span></div>
              <span style={{fontSize:"12px",color:"#B45309",fontWeight:"bold"}}>{showDisclaimer?"▲ Hide":"▼ Read"}</span>
            </div>
            {showDisclaimer&&(
              <div style={{background:"#FFFBF0",padding:"12px 14px",fontSize:"12px",color:"#78350F",lineHeight:"1.7",borderTop:"1px solid #F59E0B"}}>
                <p style={{margin:"0 0 8px"}}>Logbuz provides <strong>doorstep sample collection</strong> services only. We do <strong>not</strong> provide diagnosis, medical advice, or treatment.</p>
                <p style={{margin:"0 0 8px"}}>Test reports are issued by affiliated NABL-accredited laboratories (Atulaya Healthcare, Dr. Lal PathLabs, Agilus Diagnostics) and must be interpreted by a qualified medical professional.</p>
                <p style={{margin:0}}>Logbuz is not responsible for delays caused by incorrect address, patient unavailability, or force majeure events.</p>
              </div>
            )}
          </div>

          {/* Policy Checkbox */}
          <div style={{background:"#F0FDF4",border:"1.5px solid #86EFAC",borderRadius:"10px",padding:"12px 14px",marginBottom:"14px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:"10px"}}>
              <input type="checkbox" id="policyCheck" checked={policyAccepted} onChange={e=>setPolicyAccepted(e.target.checked)} style={{marginTop:"3px",width:"17px",height:"17px",accentColor:"#059669",cursor:"pointer",flexShrink:0}}/>
              <label htmlFor="policyCheck" style={{fontSize:"12px",color:"#166534",lineHeight:"1.6",cursor:"pointer"}}>
                I agree to the <span onClick={e=>{e.preventDefault();setShowPolicy(true);}} style={{color:"#2E86AB",fontWeight:"bold",textDecoration:"underline",cursor:"pointer"}}>Terms & Service Policy</span>. I understand this is a <strong>home sample collection service only</strong>.
              </label>
            </div>
          </div>

          <button style={{...S.submitBtn,opacity:(submitting||!policyAccepted)?0.6:1,cursor:policyAccepted?"pointer":"not-allowed"}} onClick={handleSubmit} disabled={submitting||!policyAccepted}>
            {submitting?"⏳ Saving...":total>0?`📋 Confirm Booking — ₹${total}`:"📋 Confirm Booking"}
          </button>
        </div>

        {/* Terms Modal */}
        {showPolicy&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
            <div style={{background:"#fff",borderRadius:"16px",maxWidth:"480px",width:"100%",maxHeight:"80vh",overflowY:"auto",padding:"24px",boxShadow:"0 8px 40px rgba(0,0,0,0.2)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>

              <div style={S.formRow}><label style={S.label}>Password</label><input type="password" style={S.input(userLoginError)} value={userLoginForm.password} placeholder="Your password" onChange={e=>setUserLoginForm(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleUserLogin()}/>{userLoginError&&<div style={S.errMsg}>{userLoginError}</div>}</div>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>

                <button onClick={()=>{setShowSignup(false);setSignupError("");}} style={{background:"none",border:"none",fontSize:"24px",cursor:"pointer",color:"#aaa"}}>×</button>
              </div>
              <p style={{fontSize:"12px",color:"#888",margin:"0 0 16px"}}>Sign up to track your bookings</p>
              {[["name","Full Name","Your full name"],["username","Username","Min 3 characters"],["contact","WhatsApp Number","10-digit number"]].map(([f,l,ph])=>(
                <div key={f} style={S.formRow}><label style={S.label}>{l}</label><input style={S.input(false)} value={signupForm[f]} placeholder={ph} onChange={e=>setSignupForm(p=>({...p,[f]:e.target.value}))}/></div>
              ))}
              {[["password","Password","Min 4 characters"],["confirmPwd","Confirm Password","Re-enter password"]].map(([f,l,ph])=>(
                <div key={f} style={S.formRow}><label style={S.label}>{l}</label><input type="password" style={S.input(false)} value={signupForm[f]} placeholder={ph} onChange={e=>setSignupForm(p=>({...p,[f]:e.target.value}))}/></div>
              ))}
              {signupError&&<div style={{background:"#FEE2E2",color:"#DC2626",borderRadius:"8px",padding:"8px 12px",fontSize:"12px",marginBottom:"12px",fontWeight:"bold"}}>✗ {signupError}</div>}
              <button style={S.submitBtn} onClick={handleSignup}>✓ Create My Account</button>
              <div style={{textAlign:"center",marginTop:"12px",fontSize:"12px",color:"#888"}}>
                Already have an account? <button onClick={()=>{setShowSignup(false);setSignupError("");}} style={{background:"none",border:"none",color:"#2E86AB",fontWeight:"bold",cursor:"pointer",textDecoration:"underline"}}>Sign In</button>
              </div>
            </div>
          </div>
        )}

        {/* Delete Confirm Modal */}
        {confirmDelete&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>

              <div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
                <button onClick={()=>setConfirmDelete(null)} style={{padding:"10px 22px",borderRadius:"8px",border:"2px solid #ccc",background:"#fff",color:"#555",fontWeight:"bold",cursor:"pointer"}}>Cancel</button>
                <button onClick={doDelete} style={{padding:"10px 22px",borderRadius:"8px",border:"none",background:"#E74C3C",color:"#fff",fontWeight:"bold",cursor:"pointer"}}>Yes, Delete</button>

        )}

        <div style={{textAlign:"center",padding:"14px 0 6px",color:"#999",fontSize:"12px"}}>
          <div style={{marginBottom:"4px"}}><span style={{fontWeight:"bold",color:"#2E86AB"}}>Logbuz Home Collection</span> — Doorstep diagnostic service</div>
          <div>📞 Support: <a href="tel:9419043000" style={{color:"#2E86AB",fontWeight:"bold",textDecoration:"none"}}>9419043000</a></div>
        </div>
      </div>
    </div>
  );
}

  <script>
    var dp=null,isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent),
        isStandalone=window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches;
    window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;});
    window.__logbuzInstall=async function(){
      if(isStandalone){alert('Logbuz is already installed! ✅');return;}
      if(isIOS){document.getElementById('ios-modal').classList.add('show');return;}
      if(dp){dp.prompt();var r=await dp.userChoice;if(r.outcome==='accepted'){var d=document.getElementById('android-done');d.style.display='block';setTimeout(function(){d.style.display='none';},4000);}dp=null;return;}
      alert('To install:
Android: Tap ⋮ menu → "Add to Home Screen"
iPhone: Tap Share ⬆️ → "Add to Home Screen"');
    };
    document.getElementById('ios-close-btn').addEventListener('click',function(){document.getElementById('ios-modal').classList.remove('show');});
    document.getElementById('ios-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
    window.addEventListener('appinstalled',function(){var d=document.getElementById('android-done');d.style.display='block';setTimeout(function(){d.style.display='none';},4000);});
    window.addEventListener('error',function(e){var l=document.getElementById('app-loading');if(l)l.innerHTML='<div style="padding:30px;text-align:center"><h2 style="color:#E74C3C;margin-bottom:12px">⚠️ Error</h2><p style="color:#333;font-size:14px">'+e.message+'</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#1B4F72;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">Retry</button></div>';});
  </script>
  <!-- Global Confirm Delete Modal - works across all views -->
  <div id="global-delete-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:99990;align-items:center;justify-content:center;padding:16px">
    <div style="background:#fff;border-radius:16px;max-width:320px;width:100%;padding:28px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.25)">
      <div style="font-size:44px;margin-bottom:10px">🗑️</div>
      <h3 id="gdm-title" style="color:#E74C3C;margin:0 0 8px">Delete?</h3>
      <p id="gdm-label" style="font-size:13px;color:#555;margin:0 0 20px"></p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button onclick="window.__gdmCancel&&window.__gdmCancel()" style="padding:10px 22px;border-radius:8px;border:2px solid #ccc;background:#fff;color:#555;font-weight:bold;cursor:pointer;font-size:14px">Cancel</button>
        <button onclick="window.__gdmConfirm&&window.__gdmConfirm()" style="padding:10px 22px;border-radius:8px;border:none;background:#E74C3C;color:#fff;font-weight:bold;cursor:pointer;font-size:14px">Yes, Delete</button>
      </div>
    </div>
  </div>
  <script>
    // Global delete modal helper - can be triggered from any React view
    window.__showDeleteModal = function(label, onConfirm) {
      var modal = document.getElementById('global-delete-modal');
      document.getElementById('gdm-label').textContent = 'Delete "' + label + '"? This cannot be undone.';
      modal.style.display = 'flex';
      window.__gdmConfirm = function() {
        modal.style.display = 'none';
        if (onConfirm) onConfirm();
      };
      window.__gdmCancel = function() {
        modal.style.display = 'none';
      };
      // Click outside to cancel
      modal.onclick = function(e) { if(e.target===modal) modal.style.display='none'; };
    };
  </script>
</body>
